name: CI - Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile



      - name: Type check with TypeScript
        run: yarn build

      - name: Run tests
        run: yarn test:coverage
        env:
          NODE_ENV: test
          DB_HOST: ${{ secrets.TEST_DB_HOST || 'localhost' }}
          DB_PORT: ${{ secrets.TEST_DB_PORT || '5432' }}
          DB_USERNAME: ${{ secrets.TEST_DB_USERNAME || 'postgres' }}
          DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD || 'postgres' }}
          DB_DATABASE: ${{ secrets.TEST_DB_DATABASE || 'tangacare_test' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-jwt-secret-change-in-production' }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET || 'test-refresh-secret-change-in-production' }}

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

      - name: Archive test coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build application
        run: yarn build

      - name: Archive build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
